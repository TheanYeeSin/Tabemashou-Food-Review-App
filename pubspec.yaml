name: tabemashou
description: "This is Tabemashou, a food review app."
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  image_picker: ^1.2.0
  intl: ^0.20.2
  logger: ^2.6.0
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  provider: ^6.1.5
  sqflite: ^2.4.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/layouts/
